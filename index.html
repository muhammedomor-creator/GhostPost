<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPost - Anonymous Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4">

    <div id="app" class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500">GhostPost</h1>
            <button id="login-btn" class="glass px-4 py-2 rounded-full hover:bg-white/20 transition">Login with Google</button>
            <div id="user-profile" class="hidden flex items-center gap-4">
                <span id="user-name"></span>
                <button id="logout-btn" class="text-xs text-red-400">Logout</button>
            </div>
        </header>

        <main id="main-content" class="space-y-6">
            <!-- Feed Placeholder -->
            <div id="feed" class="space-y-4"></div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWrYGIf6AuUAvxygSarKYR7LXlHSHQWi4",
            authDomain: "ghostpost25.firebaseapp.com",
            projectId: "ghostpost25",
            storageBucket: "ghostpost25.firebasestorage.app",
            messagingSenderId: "129461463190",
            appId: "1:129461463190:web:a450c864710a10b8247ab7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // UI Logic
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userProfile = document.getElementById('user-profile');
        const feed = document.getElementById('feed');

        loginBtn.onclick = () => signInWithPopup(auth, provider);
        logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.classList.add('hidden');
                userProfile.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                renderFeed();
            } else {
                loginBtn.classList.remove('hidden');
                userProfile.classList.add('hidden');
                feed.innerHTML = '<p class="text-center opacity-50">Please login to see the feed.</p>';
            }
        });

        async function renderFeed() {
            const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
            onSnapshot(q, (snapshot) => {
                feed.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    feed.innerHTML += `
                        <div class="glass p-4 rounded-xl">
                            <p>${data.text}</p>
                            <small class="opacity-50">${data.authorName || 'Anonymous'}</small>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
