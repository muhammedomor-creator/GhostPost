<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostPost | Anonymous Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Background Blobs for Glassmorphism depth */
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #020617, #0f172a);
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #3b0764; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #172554; animation-delay: -5s; }
        .blob-3 { top: 40%; left: 30%; width: 40vw; height: 40vw; background: #0f766e; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: #fff;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            outline: none;
            border-color: #6366f1;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .glass-btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .glass-btn-primary:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
            transform: translateY(-2px);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Toggle Switch */
        .toggle-checkbox:checked { right: 0; border-color: #68D391; }
        .toggle-checkbox:checked + .toggle-label { background-color: #68D391; }
        .toggle-checkbox:checked + .toggle-label:after { transform: translateX(100%); border-color: white; }
    </style>
</head>
<body class="antialiased selection:bg-indigo-500 selection:text-white">

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Top Navigation -->
    <nav class="fixed top-0 w-full z-50 glass-panel border-b border-white/10">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
                <span class="text-xl font-bold tracking-wider text-white">GhostPost</span>
            </div>
            
            <div id="nav-auth-section" class="flex items-center gap-4">
                <div class="loader"></div>
            </div>
        </div>
    </nav>

    <!-- Main Content Layout -->
    <main class="max-w-6xl mx-auto px-4 pt-24 pb-12 flex flex-col md:flex-row gap-6 min-h-screen">
        
        <!-- Left Column: Feed -->
        <div class="flex-1 max-w-2xl w-full mx-auto md:mx-0">
            
            <!-- Create Post Box -->
            <div class="glass rounded-2xl p-5 mb-6 relative overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/10 to-purple-500/10 pointer-events-none"></div>
                
                <div class="flex items-start gap-3 relative z-10">
                    <img id="current-user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Guest" class="w-10 h-10 rounded-full bg-white/10" alt="Avatar">
                    <div class="flex-1">
                        <textarea id="post-input" rows="3" class="w-full glass-input rounded-xl p-3 resize-none text-sm" placeholder="What's your secret?"></textarea>
                        
                        <div class="flex items-center justify-between mt-3">
                            <div class="flex items-center gap-4">
                                <label class="flex items-center cursor-pointer">
                                    <div class="relative">
                                        <input type="checkbox" id="anon-toggle" class="sr-only">
                                        <div class="block bg-gray-600 w-10 h-6 rounded-full transition-colors duration-300"></div>
                                        <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-300"></div>
                                    </div>
                                    <span class="ml-2 text-xs font-medium text-gray-300 flex items-center gap-1">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                        Ghost Mode
                                    </span>
                                </label>
                                <span id="word-count" class="text-xs text-indigo-300">0/25 words</span>
                            </div>
                            <button id="post-btn" class="glass-btn-primary px-5 py-2 rounded-xl text-sm font-semibold text-white flex items-center gap-2">
                                Post
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Feed Container -->
            <div id="feed-container" class="space-y-4">
                <div class="flex justify-center p-8"><div class="loader"></div></div>
            </div>

        </div>

        <!-- Right Column: Sidebar -->
        <div class="hidden md:block w-80 shrink-0 space-y-6">
            
            <!-- Profile Snippet -->
            <div class="glass rounded-2xl p-5">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Your Profile</h3>
                <div id="sidebar-profile" class="flex items-center gap-3">
                    <div class="loader"></div>
                </div>
            </div>

            <!-- Friend Requests -->
            <div class="glass rounded-2xl p-5">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Requests</h3>
                <div id="requests-container" class="space-y-3">
                    <p class="text-xs text-gray-500 italic">No pending requests.</p>
                </div>
            </div>

            <!-- Global Users -->
            <div class="glass rounded-2xl p-5">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">Community</h3>
                <div id="users-container" class="space-y-3 max-h-[300px] overflow-y-auto pr-2">
                    <div class="loader mx-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Toast Notifications -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 glass-panel border-indigo-500/50 px-6 py-4 rounded-xl text-sm font-medium opacity-0 transition-opacity duration-300 pointer-events-none z-50 shadow-2xl max-w-sm w-[90%] text-center">
        Notification message
    </div>

    <style>
        input:checked ~ .dot { transform: translateX(100%); }
        input:checked ~ .block { background-color: #6366f1; }
    </style>

    <!-- Firebase & App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURATION & INITIALIZATION
        const userProvidedConfig = {
            apiKey: "AIzaSyAWrYGIf6AuUAvxygSarKYR7LXlHSHQWi4",
            authDomain: "ghostpost25.firebaseapp.com",
            projectId: "ghostpost25",
            storageBucket: "ghostpost25.firebasestorage.app",
            messagingSenderId: "129461463190",
            appId: "1:129461463190:web:a450c864710a10b8247ab7",
            measurementId: "G-FJ5NESPVG3"
        };
        
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userProvidedConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ghostpost25';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Constants
        const VERIFIED_BADGE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-4 h-4 inline-block ml-1"><path d="M22.5 12.5c0-1.58-.875-2.95-2.148-3.6.152-.435.248-.9.248-1.4 0-2.21-1.79-4-4-4-.5 0-.965.1-1.4.248C14.55 2.475 13.18 1.6 11.6 1.6c-1.58 0-2.95.875-3.6 2.148-.435-.152-.9-.248-1.4-.248-2.21 0-4 1.79-4 4 0 .5.1.965.248 1.4C1.475 9.55.6 10.92.6 12.5c0 1.58.875 2.95 2.148 3.6-.152.435-.248.9-.248 1.4 0 2.21 1.79 4 4 4 .5 0 .965-.1 1.4-.248.65 1.273 2.02 2.148 3.6 2.148 1.58 0 2.95-.875 3.6-2.148.435.152.9.248 1.4.248 2.21 0 4-1.79 4-4 0-.5-.1-.965-.248-1.4 1.273-.65 2.148-2.02 2.148-3.6z" fill="#3b82f6"/><path fill-rule="evenodd" clip-rule="evenodd" d="M9.86 15.17L6.69 12c-0.39-0.39-1.02-0.39-1.41 0c-0.39 0.39-0.39 1.02 0 1.41l3.88 3.88c0.39 0.39 1.02 0.39 1.41 0l7.78-7.78c0.39-0.39 0.39-1.02 0-1.41c-0.39-0.39-1.02-0.39-1.41 0L9.86 15.17z" fill="#ffffff"/></svg>`;
        const GHOST_AVATAR = 'https://api.dicebear.com/7.x/bottts/svg?seed=Ghost&backgroundColor=transparent';

        // State
        let currentUser = null;
        let globalUsers = {};
        let globalPosts = [];
        let globalRequests = [];
        let unsubscribers = [];

        // AUTHENTICATION FLOW
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth init error:", e);
                // Extract error code to show clearly on mobile
                const errorMsg = e.code ? e.code : e.message;
                showToast(`Auth Failed: ${errorMsg}. Check Firebase settings.`);
                
                // Stop loaders so UI doesn't spin forever
                document.getElementById('nav-auth-section').innerHTML = '<span class="text-red-400 text-xs">Auth Failed</span>';
                document.getElementById('feed-container').innerHTML = '<div class="text-center text-red-400 p-5">Could not connect to Firebase database.</div>';
            }
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                try {
                    await syncUserToDB(user);
                    setupRealtimeListeners();
                    updateNavUI();
                    document.getElementById('current-user-avatar').src = getUserAvatar(user.uid);
                } catch (dbError) {
                    console.error("DB Sync Error:", dbError);
                    showToast(`Database Error: ${dbError.code || dbError.message}. Check Firestore rules.`);
                }
            } else {
                cleanupListeners();
                updateNavUI();
            }
        });

        window.loginWithGoogle = async () => {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
                showToast("Successfully logged in with Google!");
            } catch (error) {
                console.error("Google Login Error:", error);
                showToast(`Login failed: ${error.code || error.message}`);
            }
        };

        window.logout = async () => {
            await signOut(auth);
            showToast("Logged out. Reconnecting anonymously...");
            try {
                await signInAnonymously(auth);
            } catch (e) {
                showToast(`Re-auth failed: ${e.code}`);
            }
        };

        async function syncUserToDB(user) {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
            const userSnap = await getDoc(userRef);
            
            if (!userSnap.exists()) {
                const isAnon = user.isAnonymous || !user.displayName;
                const displayName = user.displayName || `Ghost_${user.uid.substring(0,5)}`;
                await setDoc(userRef, {
                    uid: user.uid,
                    displayName: displayName,
                    photoURL: user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`,
                    isVerified: false,
                    isAnonymousDefault: isAnon,
                    createdAt: Date.now()
                });
            } else if (user.displayName && userSnap.data().displayName !== user.displayName) {
                await updateDoc(userRef, {
                    displayName: user.displayName,
                    photoURL: user.photoURL || userSnap.data().photoURL
                });
            }
        }

        // REALTIME DATA LISTENERS
        function cleanupListeners() {
            unsubscribers.forEach(unsub => unsub());
            unsubscribers = [];
        }

        function setupRealtimeListeners() {
            cleanupListeners();
            if (!currentUser) return;

            const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
            const postsRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
            const reqsRef = collection(db, 'artifacts', appId, 'public', 'data', 'friendRequests');

            const unsubUsers = onSnapshot(usersRef, (snap) => {
                globalUsers = {};
                snap.docs.forEach(d => globalUsers[d.id] = d.data());
                renderSidebar();
                renderFeed();
            }, e => console.error("Users sync err:", e));

            const unsubPosts = onSnapshot(postsRef, (snap) => {
                globalPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                globalPosts.sort((a, b) => b.timestamp - a.timestamp);
                renderFeed();
            }, e => console.error("Posts sync err:", e));

            const unsubReqs = onSnapshot(reqsRef, (snap) => {
                globalRequests = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderSidebar();
            }, e => console.error("Reqs sync err:", e));

            unsubscribers.push(unsubUsers, unsubPosts, unsubReqs);
        }

        // CORE ACTIONS
        const postInput = document.getElementById('post-input');
        const wordCount = document.getElementById('word-count');
        const postBtn = document.getElementById('post-btn');
        
        postInput.addEventListener('input', (e) => {
            if(!currentUser) return;
            const text = e.target.value;
            const isVerified = globalUsers[currentUser.uid]?.isVerified || false;
            const limit = isVerified ? 50 : 25;
            
            const words = text.trim() === '' ? [] : text.trim().split(/\s+/);
            const count = words.length;
            
            if (count > limit) {
                e.target.value = words.slice(0, limit).join(' ') + ' ';
                wordCount.innerHTML = `<span class="text-red-400 font-bold">${limit}/${limit} (Limit Reached)</span>`;
            } else {
                wordCount.innerText = `${count}/${limit} words`;
                wordCount.className = "text-xs text-indigo-300";
            }
        });

        postBtn.addEventListener('click', async () => {
            if (!currentUser) return showToast("Log in to post!");
            const text = postInput.value.trim();
            if (!text) return;

            const isAnon = document.getElementById('anon-toggle').checked;
            postBtn.disabled = true;
            postBtn.innerHTML = '<div class="loader mx-auto"></div>';

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), {
                    authorId: currentUser.uid,
                    text: text,
                    isAnonymous: isAnon,
                    timestamp: Date.now(),
                    likes: [],
                    comments: []
                });
                postInput.value = '';
                postInput.dispatchEvent(new Event('input'));
                showToast("GhostPost published.");
            } catch (error) {
                console.error("Post error:", error);
                showToast(`Failed to post: ${error.code || error.message}`);
            } finally {
                postBtn.disabled = false;
                postBtn.innerHTML = `Post <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>`;
            }
        });

        window.toggleLike = async (postId) => {
            if (!currentUser) return;
            const post = globalPosts.find(p => p.id === postId);
            if (!post) return;

            let newLikes = [...(post.likes || [])];
            if (newLikes.includes(currentUser.uid)) {
                newLikes = newLikes.filter(id => id !== currentUser.uid);
            } else {
                newLikes.push(currentUser.uid);
            }

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', postId), { likes: newLikes });
            } catch (error) { console.error("Like error:", error); }
        };

        window.addComment = async (postId) => {
            if (!currentUser) return;
            const input = document.getElementById(`comment-input-${postId}`);
            const anonToggle = document.getElementById(`comment-anon-${postId}`);
            const text = input.value.trim();
            if (!text) return;

            const post = globalPosts.find(p => p.id === postId);
            if (!post) return;

            const newComment = {
                id: crypto.randomUUID(),
                authorId: currentUser.uid,
                text: text,
                isAnonymous: anonToggle.checked,
                timestamp: Date.now()
            };

            try {
                const updatedComments = [...(post.comments || []), newComment];
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', postId), {
                    comments: updatedComments
                });
                input.value = '';
            } catch (error) { console.error("Comment error:", error); }
        };

        window.toggleCommentSection = (postId) => {
            const el = document.getElementById(`comments-${postId}`);
            el.classList.toggle('hidden');
        };

        window.requestVerification = () => {
            if (!currentUser) return showToast("You must be logged in.");
            const msg = encodeURIComponent(`I want to get verified. My User ID is: ${currentUser.uid}`);
            window.open(`https://wa.me/8801949437370?text=${msg}`, '_blank');
        };

        // Social / Friend Logic
        window.sendFriendRequest = async (toUserId) => {
            if (!currentUser) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'friendRequests'), {
                    fromUserId: currentUser.uid,
                    toUserId: toUserId,
                    status: 'pending',
                    timestamp: Date.now()
                });
                showToast("Friend request sent.");
            } catch (error) { showToast(`Failed: ${error.code}`); }
        };

        window.acceptFriendRequest = async (reqId) => {
            if (!currentUser) return;
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'friendRequests', reqId), { status: 'accepted' });
                showToast("Request accepted!");
            } catch (e) { console.error(e); }
        };

        window.rejectFriendRequest = async (reqId) => {
            if (!currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'friendRequests', reqId));
                showToast("Request removed.");
            } catch (e) { console.error(e); }
        };

        // RENDERING & UI
        function getUserName(uid, forceAnon = false) {
            if (forceAnon) return "Ghost User";
            const u = globalUsers[uid];
            if (!u) return "Unknown Entity";
            return u.displayName + (u.isVerified ? VERIFIED_BADGE_SVG : "");
        }

        function getUserAvatar(uid, forceAnon = false) {
            if (forceAnon) return GHOST_AVATAR;
            const u = globalUsers[uid];
            return u?.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${uid}`;
        }

        function formatTime(ms) {
            const diff = Date.now() - ms;
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
            return new Date(ms).toLocaleDateString();
        }

        function updateNavUI() {
            const nav = document.getElementById('nav-auth-section');
            if (!currentUser) {
                nav.innerHTML = `
                    <button onclick="loginWithGoogle()" class="glass-btn px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2 text-white">
                        <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81Z"/></svg>
                        Sign in
                    </button>
                `;
            } else {
                const isAnon = currentUser.isAnonymous;
                nav.innerHTML = `
                    <button onclick="requestVerification()" class="hidden sm:flex glass-btn-primary px-3 py-1.5 rounded-lg text-xs font-semibold text-white shadow-lg items-center gap-1 mr-2">
                        Get Verified
                    </button>
                    ${isAnon ? `
                        <button onclick="loginWithGoogle()" class="text-xs text-indigo-300 hover:text-white underline mr-2">Link Google</button>
                    ` : ''}
                    <div class="relative group">
                        <img src="${getUserAvatar(currentUser.uid)}" class="w-9 h-9 rounded-full border border-white/20 cursor-pointer object-cover" alt="Profile">
                        <div class="absolute right-0 mt-2 w-48 glass rounded-xl shadow-xl py-2 hidden group-hover:block transition-all z-50">
                            <div class="px-4 py-2 border-b border-white/10 mb-1">
                                <p class="text-sm font-semibold truncate">${getUserName(currentUser.uid)}</p>
                                <p class="text-xs text-gray-400 truncate mt-1">ID: ${currentUser.uid.substring(0,8)}...</p>
                            </div>
                            <button onclick="requestVerification()" class="sm:hidden w-full text-left px-4 py-2 text-sm text-indigo-300 hover:bg-white/5">Get Verified</button>
                            <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-white/5">Sign Out</button>
                        </div>
                    </div>
                `;
            }
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            if (globalPosts.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500 glass rounded-xl">No secrets shared yet. Be the first!</div>`;
                return;
            }

            container.innerHTML = globalPosts.map(post => {
                const likes = post.likes || [];
                const comments = post.comments || [];
                const isLiked = currentUser ? likes.includes(currentUser.uid) : false;
                
                return `
                <div class="glass rounded-2xl p-5 transition-transform hover:-translate-y-1 duration-300">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <img src="${getUserAvatar(post.authorId, post.isAnonymous)}" class="w-10 h-10 rounded-full border border-white/10" alt="Avatar">
                            <div>
                                <p class="font-semibold text-sm text-white">${getUserName(post.authorId, post.isAnonymous)}</p>
                                <p class="text-xs text-gray-400">${formatTime(post.timestamp)} ${post.isAnonymous ? '• <span class="text-indigo-400">Ghost Mode</span>' : ''}</p>
                            </div>
                        </div>
                    </div>
                    
                    <p class="text-gray-200 text-sm leading-relaxed mb-5 whitespace-pre-wrap">${post.text.replace(/</g, "&lt;")}</p>
                    
                    <div class="flex items-center gap-6 border-t border-white/10 pt-3">
                        <button onclick="toggleLike('${post.id}')" class="flex items-center gap-2 text-sm ${isLiked ? 'text-pink-500' : 'text-gray-400 hover:text-pink-400'} transition-colors">
                            <svg class="w-5 h-5 ${isLiked ? 'fill-current' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                            ${likes.length}
                        </button>
                        <button onclick="toggleCommentSection('${post.id}')" class="flex items-center gap-2 text-sm text-gray-400 hover:text-indigo-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                            ${comments.length}
                        </button>
                    </div>

                    <div id="comments-${post.id}" class="hidden mt-4 pt-4 border-t border-white/10">
                        <div class="space-y-3 mb-4 max-h-48 overflow-y-auto pr-2">
                            ${comments.map(c => `
                                <div class="bg-black/20 rounded-xl p-3 flex gap-3">
                                    <img src="${getUserAvatar(c.authorId, c.isAnonymous)}" class="w-6 h-6 rounded-full mt-1" alt="Avatar">
                                    <div>
                                        <p class="text-xs font-semibold text-gray-300">${getUserName(c.authorId, c.isAnonymous)} <span class="text-gray-500 font-normal ml-1">${formatTime(c.timestamp)}</span></p>
                                        <p class="text-sm text-gray-200 mt-1">${c.text.replace(/</g, "&lt;")}</p>
                                    </div>
                                </div>
                            `).join('') || '<p class="text-xs text-gray-500 italic">No comments yet.</p>'}
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <input type="text" id="comment-input-${post.id}" class="flex-1 glass-input rounded-xl px-3 py-2 text-sm" placeholder="Add a comment...">
                            <label class="flex items-center gap-1 cursor-pointer" title="Comment Anonymously">
                                <input type="checkbox" id="comment-anon-${post.id}" class="accent-indigo-500 w-4 h-4 rounded">
                                <span class="text-xs text-gray-400 hidden sm:inline">Ghost</span>
                            </label>
                            <button onclick="addComment('${post.id}')" class="glass-btn-primary p-2 rounded-xl text-white">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderSidebar() {
            if (!currentUser) return;

            const me = globalUsers[currentUser.uid];
            if (me) {
                document.getElementById('sidebar-profile').innerHTML = `
                    <img src="${me.photoURL}" class="w-12 h-12 rounded-full border border-indigo-500/50 object-cover">
                    <div>
                        <p class="text-sm font-bold text-white flex items-center">${me.displayName} ${me.isVerified ? VERIFIED_BADGE_SVG : ''}</p>
                        <p class="text-xs text-gray-400">Word Limit: ${me.isVerified ? '50' : '25'}</p>
                    </div>
                `;
            }

            const myRequests = globalRequests.filter(r => r.toUserId === currentUser.uid && r.status === 'pending');
            const reqContainer = document.getElementById('requests-container');
            if (myRequests.length === 0) {
                reqContainer.innerHTML = '<p class="text-xs text-gray-500 italic">No pending requests.</p>';
            } else {
                reqContainer.innerHTML = myRequests.map(req => {
                    const fromUser = globalUsers[req.fromUserId];
                    if(!fromUser) return '';
                    return `
                    <div class="flex items-center justify-between bg-white/5 p-2 rounded-lg">
                        <div class="flex items-center gap-2">
                            <img src="${fromUser.photoURL}" class="w-8 h-8 rounded-full">
                            <p class="text-xs font-semibold">${fromUser.displayName.substring(0,12)}</p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="acceptFriendRequest('${req.id}')" class="p-1.5 bg-green-500/20 text-green-400 rounded hover:bg-green-500/40"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></button>
                            <button onclick="rejectFriendRequest('${req.id}')" class="p-1.5 bg-red-500/20 text-red-400 rounded hover:bg-red-500/40"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                        </div>
                    </div>`;
                }).join('');
            }

            const otherUsers = Object.values(globalUsers).filter(u => u.uid !== currentUser.uid);
            const uContainer = document.getElementById('users-container');
            
            const getRelation = (otherId) => {
                const req = globalRequests.find(r => 
                    (r.fromUserId === currentUser.uid && r.toUserId === otherId) ||
                    (r.toUserId === currentUser.uid && r.fromUserId === otherId)
                );
                return req ? req.status : 'none';
            };

            uContainer.innerHTML = otherUsers.map(u => {
                const relation = getRelation(u.uid);
                let btnHtml = '';
                if (relation === 'none') {
                    btnHtml = `<button onclick="sendFriendRequest('${u.uid}')" class="text-[10px] bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-300 px-2 py-1 rounded transition-colors">Add</button>`;
                } else if (relation === 'pending') {
                    btnHtml = `<span class="text-[10px] text-gray-500 border border-gray-600 px-2 py-1 rounded">Pending</span>`;
                } else {
                    btnHtml = `<span class="text-[10px] text-green-400 border border-green-500/30 px-2 py-1 rounded">Friend</span>`;
                }

                return `
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2 overflow-hidden mr-2">
                        <img src="${u.photoURL}" class="w-8 h-8 rounded-full shrink-0">
                        <p class="text-xs font-medium truncate text-gray-300">${u.displayName} ${u.isVerified ? VERIFIED_BADGE_SVG : ''}</p>
                    </div>
                    ${btnHtml}
                </div>`;
            }).join('');
        }

        // Utils
        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.add('opacity-0'), 4500);
        }

        // Initialize!
        initAuth();

    </script>
</body>
</html>
